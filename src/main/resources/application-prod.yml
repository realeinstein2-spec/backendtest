server:
  port: ${PORT:8080}

spring:
  jpa:
    show-sql: false
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}

# Enable Swagger/OpenAPI docs in production for API testing
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    root: WARN
    com.makershub: INFO
