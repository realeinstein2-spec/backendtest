server:
  port: 8084

spring:
  application:
    name: makershub-order-payment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/makershub}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

paystack:
  secret-key: ${PAYSTACK_SECRET_KEY:mock_paystack_key}

management:
  endpoints:
    web:
      exposure:
        include: health,info
