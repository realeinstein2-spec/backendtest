server:
  port: 8082

spring:
  application:
    name: makershub-auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/makershub}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyThatIsAtLeast32BytesLongForTesting}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:3600000} # 1 hour
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000} # 30 days

management:
  endpoints:
    web:
      exposure:
        include: health,info
