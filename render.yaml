services:
  - type: web
    name: makershub-backend
    runtime: docker
    plan: starter
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_USERNAME
        fromDatabase:
          name: makershub-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: makershub-db
          property: password
      - key: DATABASE_URL
        # Construct the JDBC url dynamically from database details
        value: jdbc:postgresql://${{makershub-db.DATABASE_HOST}}:${{makershub-db.DATABASE_PORT}}/${{makershub-db.DATABASE_NAME}}
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure secret key for you
      - key: CORS_ALLOWED_ORIGINS
        sync: false # Render will prompt you to input this value during setup
      - key: PAYSTACK_SECRET_KEY
        sync: false # Render will prompt you to input this value during setup
      - key: PAYSTACK_CALLBACK_URL
        sync: false # Render will prompt you to input this value during setup
      - key: FIREBASE_ENABLED
        value: "false"
      - key: AFRICAS_TALKING_ENABLED
        value: "false"

databases:
  - name: makershub-db
    databaseName: makershub
    user: postgres
    plan: starter
